name: Build APK

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      EXPO_TOKEN: ${{ secrets.EAS_TOKEN }}
      EAS_BUILD_NO_EXPO_GO_WARNING: true

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - run: npm install -g eas-cli

      - name: Install jq
        run: sudo apt-get install jq

      - name: Create .env file
        run: |
          cat <<EOF > .env
          EXPO_PUBLIC_FIREBASE_API_KEY=${{ secrets.FIREBASE_API_KEY }}
          EXPO_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.FIREBASE_AUTH_DOMAIN }}
          EXPO_PUBLIC_FIREBASE_PROJECT_ID=${{ secrets.FIREBASE_PROJECT_ID }}
          EXPO_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.FIREBASE_STORAGE_BUCKET }}
          EXPO_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.FIREBASE_MESSAGING_SENDER_ID }}
          EXPO_PUBLIC_FIREBASE_APP_ID=${{ secrets.FIREBASE_APP_ID }}
          EOF

      - name: Build APK
        id: build
        run: |
          BUILD_OUTPUT=$(eas build \
            --platform android \
            --profile production \
            --non-interactive \
            --wait \
            --json)

          echo "$BUILD_OUTPUT"

          APK_URL=$(echo "$BUILD_OUTPUT" | jq -r '.[0].artifacts.buildUrl')

          echo "APK_URL=$APK_URL" >> $GITHUB_ENV

      - name: Download APK
        run: curl -L "$APK_URL" -o app.apk

      - name: Upload APK to Release
        uses: softprops/action-gh-release@v2
        with:
          files: app.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}